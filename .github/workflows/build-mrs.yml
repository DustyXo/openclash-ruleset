name: Build MRS

on:
  push:
    paths:
      - 'rules/*.domain.list'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Convert domain rules to MRS
        run: |
          chmod +x .github/bin/mihomo
          for f in rules/*.domain.list; do
            name=$(basename "$f" .domain.list)
            echo "Building ${name}.mrs from ${name}.domain.list..."
            .github/bin/mihomo convert-ruleset domain text "$f" "rules/${name}.mrs"
          done
          echo "Generated:"
          ls -la rules/*.mrs

      - name: Commit MRS files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rules/*.mrs
          git diff --cached --quiet && echo "No changes" || (git commit -m "Auto-build MRS [skip ci]" && git push)
