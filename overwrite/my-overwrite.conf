[General]
# 指向策略分组+规则的独立配置文件
CONFIG_FILE = /etc/openclash/config/my-groups.yaml
# 启用自定义规则
ENABLE_CUSTOM_CLASH_RULES = 1
# 仅代理命中规则流量（0=所有流量走代理，1=仅规则匹配的走代理）
ENABLE_RULE_PROXY = 1
# 模块修改后重启插件
RESTART = true

[Overwrite]
# 替换 my-groups.yaml 中 Sub-store 的订阅 URL 为你的实际订阅地址
# 需要在 LuCI 覆写模块设置中添加环境变量：
# EN_KEY=https://你的订阅地址
ruby_map_edit "$CONFIG_FILE" "['proxy-providers']" "Sub-store" "['url']" "$EN_KEY"