# =========================================
#                 规则配置
# =========================================
rules:
  # --- 国内/直连 ---
  - RULE-SET,direct-all,全球直连
  - RULE-SET,direct-all_ip,全球直连,no-resolve

  # --- 自定义代理 ---
  - RULE-SET,custom_proxy,自定义代理

  # --- 服务分流 ---
  - RULE-SET,instant-messaging,即时通讯
  - RULE-SET,instant-messaging_ip,即时通讯,no-resolve
  - RULE-SET,social-media,社交媒体
  - RULE-SET,social-media_ip,社交媒体,no-resolve
  - RULE-SET,ai-services,AI服务
  - RULE-SET,github-all,GitHub
  - RULE-SET,category-speedtest,测速工具
  - RULE-SET,global-streaming,国外流媒体
  - RULE-SET,global-streaming_ip,国外流媒体,no-resolve
  - RULE-SET,bahamut,Bahamut
  - RULE-SET,spotify,Spotify
  - RULE-SET,game-platforms,游戏平台
  - RULE-SET,paypal,PayPal
  - RULE-SET,apple,苹果服务
  - RULE-SET,microsoft,微软服务
  - RULE-SET,google-all,谷歌服务
  - RULE-SET,google-all_ip,谷歌服务,no-resolve
  - RULE-SET,tiktok,TikTok
  - RULE-SET,gfw,手动选择

  # --- 兜底 ---
  - MATCH,漏网之鱼