# =========================================
#                 规则配置
# =========================================
rules:
  # --- 私有/内网 → 直连 ---
  - RULE-SET,private,全球直连
  - RULE-SET,private_ip,全球直连,no-resolve

  # --- 自定义直连 ---
  - RULE-SET,custom_direct,全球直连

  # --- 自定义代理 ---
  - RULE-SET,custom_proxy,自定义代理

  # --- 国内服务 → 直连 ---
  - RULE-SET,google-cn,全球直连
  - RULE-SET,category-games@cn,全球直连
