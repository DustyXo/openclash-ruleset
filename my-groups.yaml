# =========================================
#              代理提供商
# =========================================
# Icon 来源: https://github.com/Giveupmoon/Clash_Rules_Yaml
# 通过 sync-rules.yml 同步到 assets/icons/
proxy-providers:
  Sub-store:
    type: http
    interval: 3600
    proxy: DIRECT
    health-check:
      enable: true
      url: "https://g.cn/generate_204"
      interval: 10
    override:
      skip-cert-verify: true
      udp: true
    path: ./proxy_provider/provider.yaml
    filter: >-
      ^(?!.*(群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author)).*$
    url: "url"

# =========================================
#             策略组配置
# =========================================
# 所有 icon 引用自 assets/icons/（同步自 Giveupmoon/Clash_Rules_Yaml）
#
# 原始 icon 来源（如需补充新图标）：
#   HOMOMIX/Color/Large 系列:
#     https://raw.githubusercontent.com/Giveupmoon/Clash_Rules_Yaml/main/Icon/HOMOMIX/Color/Large/<name>.png
#   根目录:
#     https://raw.githubusercontent.com/Giveupmoon/Clash_Rules_Yaml/main/Icon/<name>.png
#
# 当前 assets/icons/ 内的完整文件列表：
#   11111.png, match.png,
#   AI_bot.png, Apple_black.png, Bahamut_i.png, DIRECT.png, Flight.png,
#   Game.png, GitHub.png, Google.png, Hong_Kong.png, Japan.png,
#   Microsoft.png, Network.png, PayPal.png, Singapore.png, SpeedTest.png,
#   Spotify.png, Taiwan_Province.png, Telegram.png, TikTok.png,
#   Twitter.png, USA.png
proxy-groups:

  # --- 地区节点组（url-test 自动选最优） ---
  - name: 香港节点
    type: url-test
    include-all: true
    filter: >-
      ^(?=.*(?i)(港|🇭🇰|HK|Hong|HKG)).*$
    tolerance: 20
    interval: 120
    url: https://cp.cloudflare.com/generate_204
    icon: "https://raw.githubusercontent.com/DustyXo/openclash-ruleset/main/assets/icons/Hong_Kong.png"

  - name: 美国节点
    type: url-test
    include-all: true
    filter: >-
      ^(?=.*(?i)(美|🇺🇸|US|USA|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD)).*$
    tolerance: 20
    interval: 120
    url: https://cp.cloudflare.com/generate_204
    icon: "https://raw.githubusercontent.com/DustyXo/openclash-ruleset/main/assets/icons/USA.png"

  - name: 日本节点
    type: url-test
    include-all: true
    filter: >-
      ^(?=.*(?i)(日|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK)).*$
    tolerance: 20
    interval: 120
    url: https://cp.cloudflare.com/generate_204
    icon: "https://raw.githubusercontent.com/DustyXo/openclash-ruleset/main/assets/icons/Japan.png"

  - name: 新加坡节点
    type: url-test
    include-all: true
    filter: >-
      ^(?=.*(?i)(坡|🇸🇬|SG|Sing|SIN|XSP)).*$
    tolerance: 20
    interval: 120
    url: https://cp.cloudflare.com/generate_204
    icon: "https://raw.githubusercontent.com/DustyXo/openclash-ruleset/main/assets/icons/Singapore.png"

  - name: 台湾节点
    type: url-test
    include-all: true
    filter: >-
      ^(?=.*(?i)(台|🇼🇸|🇹🇼|TW|tai|TPE|TSA|KHH)).*$
    tolerance: 20
    interval: 120
    url: https://cp.cloudflare.com/generate_204
    icon: "https://raw.githubusercontent.com/DustyXo/openclash-ruleset/main/assets/icons/Taiwan_Province.png"

  # --- 自动选择（所有节点测速选最优） ---
  - name: 自动选择
    type: url-test
    include-all: true
    tolerance: 20
    interval: 120
    url: https://cp.cloudflare.com/generate_204
    icon: "https://raw.githubusercontent.com/DustyXo/openclash-ruleset/main/assets/icons/Flight.png"

  # --- 自定义独立代理（手动切换） ---
  - name: 自定义代理
    type: select
    proxies:
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点
      - 自动选择
      - 全球直连
    use:
      - Sub-store
    icon: "https://raw.githubusercontent.com/DustyXo/openclash-ruleset/main/assets/icons/Network.png"

  # --- 直连 ---
  - name: 全球直连
    type: url-test
    proxies:
      - DIRECT
    tolerance: 100
    url: https://cp.cloudflare.com/generate_204
    icon: "https://raw.githubusercontent.com/DustyXo/openclash-ruleset/main/assets/icons/DIRECT.png"

  # --- 手动选择（含所有节点） ---
  - name: 手动选择
    type: select
    proxies:
      - 香港节点
      - 美国节点
      - 日本节点
      - 新加坡节点
      - 台湾节点
      - 自动选择
      - 全球直连
    use:
      - Sub-store
    icon: "https://raw.githubusercontent.com/DustyXo/openclash-ruleset/main/assets/icons/11111.png"

  # --- 兜底 ---
  - name: 漏网之鱼
    type: select
    proxies:
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点
      - 手动选择
      - 自动选择
      - 全球直连
    use:
      - Sub-store
    icon: "https://raw.githubusercontent.com/DustyXo/openclash-ruleset/main/assets/icons/match.png"

  # --- 服务策略组（精简合并后） ---
  - name: 即时通讯
    type: select
    proxies:
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点
      - 手动选择
      - 自动选择
      - 全球直连
    icon: "https://raw.githubusercontent.com/DustyXo/openclash-ruleset/main/assets/icons/Telegram.png"

  - name: 社交媒体
    type: select
    proxies:
      - 香港节点
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点
