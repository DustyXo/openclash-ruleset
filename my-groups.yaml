# =========================================
#            规则提供者
# =========================================
rule-providers:

  # --- 自定义代理规则 ---
  custom_proxy:
    type: http
    behavior: domain
    format: mrs
    interval: 86400
    url: "https://raw.githubusercontent.com/DustyXo/openclash-ruleset/main/rules/custom_proxy.mrs"
    path: ./rule_provider/custom_proxy.mrs

  # --- 合并规则集 domain 部分 ---
  direct-all:
    type: http
    behavior: domain
    format: mrs
    interval: 90000
    url: "https://raw.githubusercontent.com/DustyXo/openclash-ruleset/main/rules/direct-all.mrs"
    path: ./rule_provider/direct-all.mrs

  direct-all_ip:
    type: http
